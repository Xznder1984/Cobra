name: Feature Request Bot

on:
  issues:
    types: [opened, labeled]

jobs:
  forward-feature-request:
    if: github.event.issue.labels.name == 'enhancement' || github.event.issue.labels.name == 'feature-request'
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue details
        id: issue
        run: |
          echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          echo "body=${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.issue.html_url }}" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          
      - name: Send to Discord webhook
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "New Feature Request: '${{ steps.issue.outputs.title }}'",
                "description": "'${{ steps.issue.outputs.body }}'",
                "url": "'${{ steps.issue.outputs.url }}'",
                "color": 5814783,
                "fields": [
                  {"name": "Author", "value": "'${{ steps.issue.outputs.author }}'", "inline": true},
                  {"name": "Issue #", "value": "'${{ steps.issue.outputs.number }}'", "inline": true}
                ],
                "footer": {"text": "Cobra Language Feature Request"}
              }]
            }'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send to Slack webhook
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ env.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "New Feature Request",
              "blocks": [
                {"type": "header", "text": {"type": "plain_text", "text": "New Feature Request"}},
                {"type": "section", "text": {"type": "mrkdwn", "text": "*<${{ steps.issue.outputs.url }}|${{ steps.issue.outputs.title }}>*\n\n${{ steps.issue.outputs.body }}"}},
                {"type": "context", "elements": [{"type": "mrkdwn", "text": "Author: ${{ steps.issue.outputs.author }} | Issue #${{ steps.issue.outputs.number }}"}]}
              ]
            }'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Add comment to issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.issue.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Thanks for the feature request! 🎉\n\nThis has been forwarded to the maintainers for review. You can track progress on this issue.'
            })

      - name: Add "triaged" label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: ${{ steps.issue.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['triaged']
            })
